services:
  - type: web
    name: pdf-to-audio
    env: docker
    region: oregon
    plan: free
    branch: main
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: false
      - key: DJANGO_ALLOWED_HOSTS
        value: localhost,127.0.0.1,.onrender.com
      - key: DJANGO_CSRF_ORIGINS
        value: https://*.onrender.com
      - key: DJANGO_SSL
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: pdf-to-audio-db
          property: connectionString
      - key: PORT
        value: 8000

databases:
  - name: pdf-to-audio-db
    plan: free
    region: oregon
    databaseName: pdf_to_audio
    user: pdf_to_audio_user
