{% extends "base.html" %}
{% load static %}
{% block title %}Text to Speech{% endblock %}
{% block head %}
<style>
#ttsTextContainer, #batchProgressTTS, #savedModal { display:none; }
</style>
{% endblock %}
{% block body %}
<div class="app-shell">
  <div class="app-body">
    {% include '_sidebar.html' with active='tts' %}

    <main class="main-content">
      <div class="toolbar">
        <span class="toolbar-title">Text to Speech</span>
        <button id="saveTextBtn" disabled class="btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/></svg>
          Save
        </button>
        <button id="savedBtn" class="btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          Saved <span id="savedCount">0</span>
        </button>
        <button id="exportTTSBtn" disabled class="btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          Export
        </button>
        <button id="generateAllTTS" disabled class="btn btn-accent">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2z"/></svg>
          Generate All Audio
        </button>
      </div>

      <!-- Batch progress bar -->
      <div id="batchProgressTTS">
        <div>
          <div id="batchProgressBarTTS"></div>
        </div>
      </div>

      <div>
        <!-- Left: Text input -->
        <div>
          <textarea id="ttsTextarea" class="input" placeholder="Enter or paste your text here..."></textarea>
        </div>
        <!-- Right: Sentences -->
        <div>
          <div id="ttsTextContainer">
            <div id="ttsSentenceList"></div>
          </div>
          <div id="ttsEmptyState">
            <div class="empty-state"><p>Enter text to see sentences</p></div>
          </div>
        </div>
      </div>

      <!-- Transport Bar -->
      <div class="transport-bar">
        <button id="jumpBackTTS" class="transport-btn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12.066 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0019 16V8a1 1 0 00-1.6-.8l-5.333 4zM4.066 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0011 16V8a1 1 0 00-1.6-.8l-5.334 4z"/></svg>
        </button>
        <button id="skipBackTTS" class="transport-btn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button id="playTTS" class="transport-btn primary" disabled>
          <svg id="playTTSIcon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button id="skipFwdTTS" class="transport-btn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
        <button id="jumpFwdTTS" class="transport-btn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M11.934 12.8a1 1 0 000-1.6L6.6 7.2A1 1 0 005 8v8a1 1 0 001.6.8l5.334-4zM19.934 12.8a1 1 0 000-1.6l-5.334-4A1 1 0 0013 8v8a1 1 0 001.6.8l5.334-4z"/></svg>
        </button>
        <div class="scrubber"><div class="scrubber-fill" id="scrubberFillTTS"></div></div>
        <span id="sentenceCounterTTS">0 / 0</span>
        <div></div>
        <label>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/></svg>
          <input type="range" id="volumeTTS" min="0" max="1" step="0.1" value="1">
        </label>
        <select id="speedTTS" class="input">
          <option value="0.5">0.5×</option>
          <option value="0.75">0.75×</option>
          <option value="1" selected>1×</option>
          <option value="1.25">1.25×</option>
          <option value="1.5">1.5×</option>
          <option value="1.75">1.75×</option>
          <option value="2">2×</option>
          <option value="2.5">2.5×</option>
          <option value="3">3×</option>
        </select>
        <select id="voiceSelectTTS" class="input">
          <option value="en-US-JennyNeural">Jenny (US Female)</option>
        </select>
      </div>
    </main>
  </div>
</div>

<div id="savedModal" class="modal-overlay">
  <div class="modal-card">
    <div>
      <span>Saved Texts</span>
      <button id="closeSavedModal" class="btn">Close</button>
    </div>
    <div id="savedTextList"></div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="{% static 'js/tts.js' %}"></script>
{% endblock %}
