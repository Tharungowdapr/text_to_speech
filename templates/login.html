{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - PDF to Audio</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <style>
    .auth-page {
      display:flex;align-items:center;justify-content:center;min-height:100vh;
      background:var(--bg-primary);
    }
    .auth-card {
      background:var(--bg-secondary);border:1px solid var(--border-subtle);
      border-radius:12px;padding:32px;width:360px;max-width:90%;
    }
    .auth-card h1 {
      font-size:22px;font-weight:700;margin:0 0 4px;color:var(--text-primary);
    }
    .auth-card p.sub {
      font-size:12px;color:var(--text-secondary);margin:0 0 24px;
    }
    .auth-field { margin-bottom:16px; }
    .auth-field label {
      display:block;font-size:12px;font-weight:600;color:var(--text-secondary);
      margin-bottom:4px;
    }
    .auth-field input {
      width:100%;padding:8px 12px;border:1px solid var(--border-subtle);
      border-radius:6px;background:rgba(0,0,0,0.25);color:var(--text-primary);
      font-size:15px;outline:none;transition:border-color 0.15s;
    }
    .auth-field input:focus { border-color:var(--accent); }
    .auth-error { color:var(--error); font-size:12px; margin-bottom:12px; display:none; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1>Sign In</h1>
      <p class="sub">Access your PDF to Audio workspace</p>
      <div id="authError" class="auth-error"></div>
      <div class="auth-field">
        <label>Username</label>
        <input id="loginUser" type="text" autocomplete="username">
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input id="loginPass" type="password" autocomplete="current-password">
      </div>
      <button id="loginBtn" class="btn btn-accent" style="width:100%;justify-content:center;padding:8px;font-size:15px;">Sign In</button>
      <div style="text-align:center;margin-top:16px;font-size:12px;color:var(--text-tertiary);">
        Don't have an account? <a href="/register/" style="color:var(--accent);text-decoration:none;">Register</a>
      </div>
    </div>
  </div>
  <script>
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('authError');
    function doLogin() {
      const u = document.getElementById('loginUser').value.trim();
      const p = document.getElementById('loginPass').value;
      if (!u || !p) { err.textContent = 'Fill in all fields'; err.style.display = 'block'; return; }
      btn.disabled = true; btn.textContent = 'Signing in...';
      fetch('/api/login/', {
        method:'POST', headers:{'Content-Type':'application/json','X-CSRFToken':getCSRFToken()},
        body: JSON.stringify({username:u, password:p})
      }).then(r=>r.json()).then(d => {
        if (d.ok) { window.location.href = '/'; }
        else { err.textContent = d.error || 'Invalid credentials'; err.style.display = 'block'; btn.disabled = false; btn.textContent = 'Sign In'; }
      }).catch(() => { err.textContent = 'Network error'; err.style.display = 'block'; btn.disabled = false; btn.textContent = 'Sign In'; });
    }
    btn.addEventListener('click', doLogin);
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
  <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
