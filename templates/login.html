{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - PDF to Audio</title>
  
  
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1>Sign In</h1>
      <p class="sub">Access your PDF to Audio workspace</p>
      <div id="authError" class="auth-error"></div>
      <div class="auth-field">
        <label>Username</label>
        <input id="loginUser" type="text" autocomplete="username">
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input id="loginPass" type="password" autocomplete="current-password">
      </div>
      <button id="loginBtn" class="btn btn-accent">Sign In</button>
      <div>
        Don't have an account? <a href="/register/">Register</a>
      </div>
    </div>
  </div>
  <script>
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('authError');
    function doLogin() {
      const u = document.getElementById('loginUser').value.trim();
      const p = document.getElementById('loginPass').value;
      if (!u || !p) { err.textContent = 'Fill in all fields'; err.style.display = 'block'; return; }
      btn.disabled = true; btn.textContent = 'Signing in...';
      fetch('/api/login/', {
        method:'POST', headers:{'Content-Type':'application/json','X-CSRFToken':getCSRFToken()},
        body: JSON.stringify({username:u, password:p})
      }).then(r=>r.json()).then(d => {
        if (d.ok) { window.location.href = '/'; }
        else { err.textContent = d.error || 'Invalid credentials'; err.style.display = 'block'; btn.disabled = false; btn.textContent = 'Sign In'; }
      }).catch(() => { err.textContent = 'Network error'; err.style.display = 'block'; btn.disabled = false; btn.textContent = 'Sign In'; });
    }
    btn.addEventListener('click', doLogin);
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
  <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
