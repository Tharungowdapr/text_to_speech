{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}PDF to Audio Converter{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  {% block head %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}
  <div id="toast" class="toast"></div>
  <script src="{% static 'js/main.js' %}"></script>
  {% block scripts %}{% endblock %}
  <script>
  (function() {
    var x = new XMLHttpRequest();
    x.open('GET', '/api/me/');
    x.onload = function() {
      var d = JSON.parse(x.responseText);
      var el = document.getElementById('userMenu');
      if (!el) return;
      if (d.authenticated) {
        el.innerHTML = '<span style="font-size:12px;color:var(--text-secondary);">' + d.username + '</span>'
          + '<button onclick="fetch(\'/api/logout/\',{method:\'POST\',headers:{\'X-CSRFToken\':getCSRFToken()}}).then(()=>location.href=\'/\')" class="btn" style="padding:2px 8px;font-size:11px;">Sign Out</button>';
      } else {
        el.innerHTML = '<a href="/login/" class="btn" style="padding:2px 8px;font-size:11px;text-decoration:none;">Sign In</a>';
      }
    };
    x.send();
  })();
  </script>
</body>
</html>
